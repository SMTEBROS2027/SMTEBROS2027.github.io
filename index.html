    <title>คำใบ้พี่รหัส SMTE</title>
    <style>
        /* CSS ตกแต่งเว็บไซต์ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000, #0a192f, #3b0764);
            color: #ffffff;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 2.5em; color: #00d2ff; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; text-align: center; }
        
        /* ปุ่มระดับชั้น */
        .class-btn {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: 0.3s;
        }
        .class-btn:hover { background: #8e2de2; transform: scale(1.05); }
        
        /* รายชื่อนักเรียน */
        #student-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .student-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d2ff;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 120px;
            transition: 0.3s;
        }
        .student-card:hover { background: rgba(0, 210, 255, 0.2); }
        
        /* ส่วนพี่รหัส */
        .seniors-section { margin-top: 50px; border-top: 2px dashed #8e2de2; padding-top: 30px; }
        #senior-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .senior-card {
            background: rgba(142, 45, 226, 0.2);
            border: 1px solid #8e2de2;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100px;
            transition: 0.3s;
        }
        .senior-card:hover { background: rgba(142, 45, 226, 0.5); }

        /* หน้าต่าง Popup (Modal) */
        .modal {
            display: none; position: fixed; z-index: 1; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            margin: 15% auto; padding: 20px; border: 1px solid #888;
            width: 80%; max-width: 400px; border-radius: 10px; text-align: center;
        }
        .close { color: #fff; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: #ff0000; }
        .senior-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
    </style>

        const modal = document.getElementById("myModal");
        const modalBody = document.getElementById("modal-body");

        // ฟังก์ชันแสดงรายชื่อน้อง
        function showStudents(className) {
            document.getElementById("current-class").innerText = `รายชื่อน้อง ${className}`;
            const studentList = document.getElementById("student-list");
            studentList.innerHTML = ""; // เคลียร์ของเก่า

            const students = studentsData[className] || [];
            
            if(students.length === 0) {
                studentList.innerHTML = "<p>ยังไม่มีข้อมูลในชั้นนี้</p>";
                return;
            }

            students.forEach(student => {
                const div = document.createElement("div");
                div.className = "student-card";
                div.innerText = student.name;
                div.onclick = () => showHint(student.name, student.hint);
                studentList.appendChild(div);
            });
        }

        // ฟังก์ชันแสดงคำใบ้
        function showHint(name, hint) {
            modalBody.innerHTML = `<h3>คำใบ้ของ ${name}</h3><p style="font-size: 1.2em; color: #00d2ff;">"${hint}"</p>`;
            modal.style.display = "block";
        }

        // โหลดข้อมูลพี่รหัส
        function loadSeniors() {
            const seniorList = document.getElementById("senior-list");
            seniorsData.forEach(senior => {
                const div = document.createElement("div");
                div.className = "senior-card";
                div.innerText = senior.name;
                div.onclick = () => showSeniorInfo(senior);
                seniorList.appendChild(div);
            });
        }

        // ฟังก์ชันแสดงข้อมูลพี่รหัส
        function showSeniorInfo(senior) {
            modalBody.innerHTML = `
                <img src="${senior.image}" class="senior-img" alt="รูปพี่รหัส">
                <h3>${senior.name}</h3>
                <p style="color: #00d2ff; font-size: 1.2em;">ช่องทางการติดต่อ:</p>
                <p>${senior.contact}</p>
            `;
            modal.style.display = "block";
        }

        // ปิดหน้าต่าง Popup
        function closeModal() {
            modal.style.display = "none";
        }
        window.onclick = function(event) {
            if (event.target == modal) { modal.style.display = "none"; }
        }

        loadSeniors();
